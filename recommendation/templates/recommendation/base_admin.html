{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-[calc(100vh-140px)]">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-coffee-100/60 shadow-sm flex-shrink-0">
        <div class="p-6">
            <h3 class="text-xs font-bold text-coffee-400 uppercase tracking-widest mb-6">Panel Admin</h3>
            <nav class="flex flex-col gap-1">
                <a href="{% url 'recommendation:admin_menu' %}" 
                   class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all
                   {% if request.resolver_match.url_name == 'admin_menu' %}bg-gradient-to-r from-coffee-600 to-coffee-700 text-white shadow-md{% else %}text-coffee-600 hover:bg-coffee-50{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    Kelola Data Menu
                </a>
                <a href="{% url 'recommendation:admin_users' %}"
                   class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all
                   {% if request.resolver_match.url_name == 'admin_users' %}bg-gradient-to-r from-coffee-600 to-coffee-700 text-white shadow-md{% else %}text-coffee-600 hover:bg-coffee-50{% endif %}">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                    Kelola Data Pengguna
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-grow p-8">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
