{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 animate-fade-in">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl border border-coffee-100/60 overflow-hidden">
            <div class="h-2 bg-gradient-to-r from-coffee-400 via-coffee-600 to-coffee-800"></div>

            <div class="p-10 text-center">
                <!-- Logo -->
                <div class="w-16 h-16 bg-gradient-to-br from-coffee-500 to-coffee-800 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cream-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" />
                    </svg>
                </div>

                <h1 class="text-2xl font-bold text-coffee-800 mb-1">5CM Coffee And Eatery</h1>
                <h2 class="text-sm font-semibold text-coffee-400 uppercase tracking-widest mb-8">Login</h2>

                {% if form.errors %}
                <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg p-3 mb-6">
                    Email atau Password salah.
                </div>
                {% endif %}

                <form method="POST" class="flex flex-col gap-4 text-left">
                    {% csrf_token %}
                    <div>
                        <label class="block text-xs font-semibold text-coffee-500 uppercase tracking-wider mb-1.5">Email</label>
                        <input type="text" name="username" placeholder="Masukkan email / username" required
                            class="w-full border border-coffee-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-coffee-300 focus:border-coffee-400 bg-cream-50 placeholder-coffee-200 transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-coffee-500 uppercase tracking-wider mb-1.5">Password</label>
                        <input type="password" name="password" placeholder="Masukkan password" required
                            class="w-full border border-coffee-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-coffee-300 focus:border-coffee-400 bg-cream-50 placeholder-coffee-200 transition-all">
                    </div>
                    <button type="submit" class="btn-glow mt-2 w-full bg-gradient-to-r from-coffee-600 to-coffee-700 text-white font-semibold py-3 rounded-xl text-sm shadow-md">
                        Login
                    </button>
                </form>

                <p class="mt-6 text-sm text-coffee-400">
                    Belum punya akun? 
                    <a href="{% url 'recommendation:register' %}" class="text-coffee-600 font-semibold hover:text-coffee-800 underline decoration-coffee-300 underline-offset-2 transition-colors">Registrasi di sini</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
