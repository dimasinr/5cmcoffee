{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 animate-fade-in">
    <div class="bg-white rounded-2xl shadow-xl border border-coffee-100/60 overflow-hidden max-w-sm w-full">
        <div class="h-2 bg-gradient-to-r from-coffee-400 via-coffee-600 to-coffee-800"></div>
        <div class="p-10 text-center">
            <div class="w-14 h-14 bg-coffee-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-coffee-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </div>
            <h3 class="text-xl font-bold text-coffee-800 mb-8">Anda Yakin untuk Keluar?</h3>
            <div class="flex justify-center gap-4">
                <form method="POST" action="{% url 'recommendation:logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn-glow bg-gradient-to-r from-coffee-600 to-coffee-700 text-white font-semibold px-8 py-2.5 rounded-xl text-sm shadow-md">
                        Ya
                    </button>
                </form>
                <a href="javascript:history.back()" class="border border-coffee-200 text-coffee-600 font-semibold px-8 py-2.5 rounded-xl text-sm hover:bg-coffee-50 transition-colors">
                    Tidak
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
