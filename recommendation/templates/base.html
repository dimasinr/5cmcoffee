<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5CM Coffee And Eatery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        coffee: {
                            50: '#fdf8f0',
                            100: '#f5e6d3',
                            200: '#e8caa8',
                            300: '#d4a574',
                            400: '#c08a50',
                            500: '#9e6b3a',
                            600: '#7a4f2b',
                            700: '#5c3a1f',
                            800: '#3d2614',
                            900: '#1e130a',
                        },
                        cream: {
                            50: '#FFFDF8',
                            100: '#FFF8ED',
                            200: '#FFF0D6',
                        }
                    },
                    fontFamily: {
                        display: ['Playfair Display', 'serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Subtle grain texture overlay */
        .bg-grain::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Glass effect */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Smooth fade-in animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        .animate-fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .animate-fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .animate-fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }

        /* Button hover glow */
        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .btn-glow::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transition: width 0.4s ease, height 0.4s ease;
            transform: translate(-50%, -50%);
        }
        .btn-glow:hover::after {
            width: 300px; height: 300px;
        }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(94, 58, 31, 0.3);
        }

        /* Card hover */
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(94, 58, 31, 0.12);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col bg-cream-50 bg-grain">
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass border-b border-coffee-100/50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% url 'recommendation:home' %}" class="flex items-center gap-3 group">
                <div class="w-10 h-10 bg-gradient-to-br from-coffee-600 to-coffee-800 rounded-xl flex items-center justify-center shadow-md group-hover:shadow-lg transition-shadow">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cream-100" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z" />
                    </svg>
                </div>
                <span class="text-xl font-bold text-coffee-800 tracking-tight">5CM Coffee And Eatery</span>
            </a>
            {% if user.is_authenticated %}
                <a href="{% url 'recommendation:logout' %}" class="text-sm font-medium text-coffee-600 hover:text-coffee-800 border border-coffee-200 px-4 py-2 rounded-lg hover:bg-coffee-50 transition-all">
                    Logout
                </a>
            {% endif %}
        </div>
    </nav>

    <!-- Flash Messages -->
    {% if messages %}
    <div class="max-w-6xl mx-auto px-6 mt-4">
        {% for message in messages %}
        <div class="p-4 rounded-xl text-sm mb-2 animate-fade-in
            {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% elif message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200
            {% else %}bg-coffee-50 text-coffee-700 border border-coffee-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Main Content -->
    <main class="flex-grow relative z-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="mt-auto border-t border-coffee-100/50 bg-white/50">
        <div class="max-w-6xl mx-auto px-6 py-6 text-center">
            <p class="text-xs text-coffee-300">&copy; {% now "Y" %} 5CM Coffee And Eatery &mdash; Sistem Rekomendasi Kopi</p>
        </div>
    </footer>
</body>
</html>
